<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Albim</title>
  <meta name="description" content="Organize seu album da Copa, acompanhe figurinhas disponiveis para troca e baixe o Albim.">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page">
    <section class="hero-card">
      <div class="brand-wrap">
        <img class="brand-logo" src="./assets/albimlogo.webp" alt="Albim" data-fallback-text="Albim">
      </div>

      <div class="eyebrow">Albim</div>
      <h1 class="hero-title">Seu album da Copa, do seu jeito.</h1>
      <p class="hero-copy">
        Organize sua colecao, veja o que falta, acompanhe duplicadas e compartilhe seu album para troca.
      </p>

      <div class="hero-image-wrap">
        <img class="hero-image" src="./assets/album_onboarding.webp" alt="Album Albim" data-fallback-text="Album Albim">
      </div>

      <div class="actions">
        <a class="store-badge" id="ios-link" href="https://apps.apple.com/app/id0000000000" target="_blank" rel="noreferrer" aria-label="Download on the App Store">
          <img class="store-badge-image" src="./assets/appstore.svg" alt="Download on the App Store">
        </a>

        <a class="store-badge" id="android-link" href="https://play.google.com/store/apps/details?id=app.mazarini.albim" target="_blank" rel="noreferrer" aria-label="Get it on Google Play">
          <img class="store-badge-image" src="./assets/googleplay.svg" alt="Get it on Google Play">
        </a>
      </div>

      <p class="helper-text">
        Baixe o app para controlar seu album e facilitar suas trocas de figurinhas.
      </p>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
